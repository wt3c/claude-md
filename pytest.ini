[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    integration: Integration tests (run actual scripts, slower)
    unit: Unit tests (fast, isolated)
    windows: Windows-specific tests
    linux: Linux-specific tests

# Output
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Coverage
[coverage:run]
source = tests.test_helpers
omit = tests/conftest.py

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
